name: AMC Ticket Watcher

on:
  schedule:
    # Run once per hour. The workflow itself performs checks every 5 minutes.
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  check-seats:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.54.0-noble

    # Allow enough time for 12 polls (1 hour) plus startup overhead.
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore watcher state
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: |
            watcher-state-

      - name: Poll AMC every 5 minutes for 1 hour
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          for i in {1..12}; do
            echo "=== Poll $i of 12 ($(date -u)) ==="

            python watcher.py --config config.yaml --once

            # Don't sleep after the final poll.
            if [ "$i" -lt 12 ]; then
              sleep 300
            fi
          done
