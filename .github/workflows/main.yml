name: AMC Ticket Watcher

on:
  schedule:
    # Run once per hour. The workflow itself checks every 5 minutes.
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-seats:
    runs-on: ubuntu-latest
    timeout-minutes: 70  # allows ~1 hour of polling plus setup time

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      # Persists watcher_state.json (notification cooldown/dedupe) across
      # runs. Each run writes under a unique key so the save always
      # succeeds, and restore-keys picks up the most recent prior state.
      - name: Restore watcher state
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: |
            watcher-state-

      - name: Poll AMC every 5 minutes for 1 hour
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        shell: bash
        run: |
          for i in {1..12}; do
            echo "========================================"
            echo "Poll $i of 12 - $(date -u)"
            echo "========================================"

            python watcher.py --config config.yaml --once

            # Don't sleep after the last poll
            if [ "$i" -lt 12 ]; then
              echo "Sleeping for 5 minutes..."
              sleep 300
            fi
          done
