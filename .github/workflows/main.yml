name: AMC Ticket Watcher

on:
  schedule:
    # Every 5 minutes — GitHub's minimum granularity for scheduled workflows.
    # Note: GitHub may delay scheduled runs by a few minutes during high load
    # (especially at the top of the hour), so treat this as "roughly every
    # 5 min," not exact. IMPORTANT: see the README for why 5 min may not fit
    # a private repo's free minutes budget — public repos get unlimited.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-seats:
    runs-on: ubuntu-latest
    # Prebuilt image with Chromium + all OS deps already installed — this is
    # what eliminates the slow "playwright install --with-deps chromium"
    # step (usually 1-2+ minutes on a fresh runner). The pinned version here
    # MUST exactly match the "playwright" version in requirements.txt, or
    # Playwright won't find the browser executable.
    container:
      image: mcr.microsoft.com/playwright/python:v1.54.0-noble
    timeout-minutes: 5  # safety net in case a page hangs

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Persists watcher_state.json (notification cooldown/dedupe) across
      # runs. Each run writes under a unique key so the save always
      # succeeds, and restore-keys picks up the most recent prior state.
      - name: Restore watcher state
        uses: actions/cache@v4
        with:
          path: watcher_state.json
          key: watcher-state-${{ github.run_id }}
          restore-keys: |
            watcher-state-

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python watcher.py --config config.yaml --once
